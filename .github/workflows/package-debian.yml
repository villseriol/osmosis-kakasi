name: Package Debian
on: [workflow_dispatch]
jobs:
  create-debian-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          gpg-private-key: ${{secrets.GPG_PRIVATE_KEY}}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Package
        env:
          MAVEN_GPG_PASSPHRASE: ${{secrets.GPG_PASSPHRASE}}
        run: mvn clean package -Pdebian-build
      - name: Get Final Artifact Names
        id: get-final-name
        run: |
          FINAL_NAME=$(mvn help:evaluate -Dexpression=project.build.debian -q -DforceStdout)

          echo "final_name=$FINAL_NAME" >> $GITHUB_OUTPUT
      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: osmosis-kakasi-artifacts
          path: |
            target/${{ steps.get-final-name.outputs.final_name }}.deb
            target/${{ steps.get-final-name.outputs.final_name }}.changes

  sign-debian-packages:
    runs-on: ubuntu-latest
    needs: create-debian-package
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: osmosis-kakasi-artifacts
      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Sign
        run: debsign target/${{ needs.create-debian-package.outputs.final_name }}.changes
      - name: Verify
        run: debsign -v target/${{ needs.create-debian-package.outputs.final_name }}.changes
